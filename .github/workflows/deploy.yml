name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Grant write permissions to GITHUB_TOKEN to enable deployment to gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Build 🏗️
        run: npm run build

      - name: Prepare SPA for GitHub Pages 404 Routing 🛠️
        run: |
          cp dist/client/index.html dist/client/404.html

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/client
          branch: gh-pages
          clean: true
